# lazygit config
# Docs: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  # Use Nerd Font icons
  nerdFontsVersion: "3"
  # Rounded borders
  border: rounded
  # Catppuccin Mocha theme
  theme:
    activeBorderColor:
      - "#cba6f7" # Mauve
      - bold
    inactiveBorderColor:
      - "#45475a" # Surface1
    optionsTextColor:
      - "#89b4fa" # Blue
    selectedLineBgColor:
      - "#313244" # Surface0
    selectedRangeBgColor:
      - "#313244" # Surface0
    cherryPickedCommitBgColor:
      - "#45475a" # Surface1
    cherryPickedCommitFgColor:
      - "#cba6f7" # Mauve
    unstagedChangesColor:
      - "#f38ba8" # Red
    defaultFgColor:
      - "#cdd6f4" # Text
    searchingActiveBorderColor:
      - "#f9e2af" # Yellow
git:
  # Do not fetch all remotes on startup
  autoFetch: false
os:
  # Open files in Neovim
  edit: "nvim {{filename}}"
  editAtLine: "nvim +{{line}} {{filename}}"
  editAtLineAndWait: "nvim +{{line}} {{filename}}"
  openDirInEditor: "nvim {{dir}}"
  # Suspend lazygit while the editor is open, then resume
  suspend: true
